<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="codenano web UI — chat with your codenano agent." />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/codenano_favicon_32.png" />
    <link rel="icon" type="image/png" sizes="73x75" href="/brand/codenano_icon.png" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #0a0a0a;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Noto Sans SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      html.dark body {
        background: #1a1a1a;
        color: #fafafa;
      }

      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }

      html.dark .boot-splash {
        background: #0f0f10;
      }

      .boot-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .boot-spinner {
        position: relative;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .boot-glow {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background: rgba(96, 165, 250, 0.2);
        filter: blur(12px);
        animation: boot-pulse 2s ease-in-out infinite;
      }

      .boot-ring {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 3px solid rgba(148, 163, 184, 0.3);
        border-top-color: rgba(59, 130, 246, 0.8);
        animation: boot-spin 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .boot-dot {
        position: relative;
        z-index: 1;
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        background: rgba(59, 130, 246, 0.8);
        animation: boot-pulse 2s ease-in-out infinite;
      }

      .boot-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #94a3b8;
      }

      html.dark .boot-label {
        color: #64748b;
      }

      @keyframes boot-pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1); }
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('codenano-webui.theme');
          var dark =
            stored === 'dark' ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch {}
      })();
    </script>
    <title>codenano</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner">
          <div class="boot-spinner">
            <div class="boot-glow"></div>
            <div class="boot-ring"></div>
            <div class="boot-dot"></div>
          </div>
          <span class="boot-label">正在加载</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
